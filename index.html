<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CA05 跨云运维助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --primary: #38bdf8;
  --primary-dim: #0ea5e9;
  --accent: #34d399;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --danger: #f87171;
  --warning: #fbbf24;
  --radius: 12px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header .badge {
  font-size: 11px;
  background: var(--primary-dim);
  color: #fff;
  padding: 2px 8px;
  border-radius: 10px;
  -webkit-text-fill-color: #fff;
}
.tabs {
  display: flex;
  background: var(--surface);
  padding: 4px 8px;
  gap: 4px;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 8px 0;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
}
.tab.active {
  background: var(--primary-dim);
  color: #fff;
}
.panels { flex: 1; overflow: hidden; position: relative; }
.panel {
  position: absolute; inset: 0;
  overflow-y: auto;
  padding: 12px;
  display: none;
  -webkit-overflow-scrolling: touch;
}
.panel.active { display: flex; flex-direction: column; }

/* Chat panel */
#chatMessages {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
  animation: fadeIn .3s ease;
}
.msg.user {
  align-self: flex-end;
  background: var(--primary-dim);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start;
  background: var(--surface);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg.error {
  align-self: flex-start;
  background: rgba(248,113,113,0.15);
  color: var(--danger);
  border: 1px solid rgba(248,113,113,0.2);
}
.msg .timestamp { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
.msg pre {
  background: var(--bg);
  padding: 8px;
  border-radius: 8px;
  overflow-x: auto;
  font-size: 12px;
  margin: 6px 0;
}
.msg code {
  font-size: 12px;
  background: rgba(255,255,255,0.08);
  padding: 1px 5px;
  border-radius: 4px;
}
.typing {
  align-self: flex-start;
  background: var(--surface);
  padding: 12px 18px;
  border-radius: 14px;
  display: flex;
  gap: 4px;
}
.typing span {
  width: 6px; height: 6px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }

/* Input */
.input-bar {
  display: flex;
  gap: 8px;
  padding: 8px 0 4px;
  flex-shrink: 0;
}
.input-bar input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 10px 16px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.input-bar input:focus { border-color: var(--primary-dim); }
.input-bar button {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--primary-dim);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.input-bar button:disabled { opacity: .4; }

/* Config panel */
.config-group { margin-bottom: 16px; }
.config-group label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.config-group input, .config-group textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
.config-group textarea { font-family: monospace; font-size: 12px; resize: vertical; min-height: 60px; }
.config-group input:focus, .config-group textarea:focus { border-color: var(--primary-dim); }
.btn-primary {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, var(--primary-dim), var(--primary));
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.btn-secondary {
  width: 100%;
  padding: 10px;
  border-radius: var(--radius);
  border: 1px solid var(--surface2);
  background: transparent;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  margin-top: 8px;
}
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}
.status-dot.online { background: var(--accent); }
.status-dot.offline { background: var(--danger); }

/* Log panel */
#logContent {
  font-family: monospace;
  font-size: 11px;
  line-height: 1.6;
  white-space: pre-wrap;
  background: var(--surface);
  padding: 12px;
  border-radius: var(--radius);
  color: var(--text-dim);
  flex: 1;
  overflow-y: auto;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }

/* Memory display */
.memory-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
}
.memory-card h4 {
  font-size: 13px;
  color: var(--primary);
  margin-bottom: 6px;
}
.memory-card p {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* Diagram */
.diagram-container {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
}
</style>
</head>
<body>

<header>
  <h1>CA05</h1>
  <span class="badge">跨云运维</span>
</header>

<div class="tabs">
  <div class="tab active" data-tab="chat">对话</div>
  <div class="tab" data-tab="config">配置</div>
  <div class="tab" data-tab="logs">日志</div>
</div>

<div class="panels">
  <!-- Chat Panel -->
  <div class="panel active" id="panelChat">
    <div id="chatMessages">
      <div class="msg assistant">
        你好！我是 CA05 跨云运维助手。我可以帮你管理阿里云资源、生成架构图、记住你的运维习惯。有什么可以帮你的？
        <div class="timestamp">准备就绪</div>
      </div>
    </div>
    <div class="input-bar">
      <input type="text" id="chatInput" placeholder="输入指令..." autocomplete="off">
      <button id="sendBtn">↵</button>
    </div>
  </div>

  <!-- Config Panel -->
  <div class="panel" id="panelConfig">
    <div class="config-group">
      <label>AgentRun 端点 URL</label>
      <input type="url" id="endpointUrl" placeholder="https://xxx.agentrun-data.cn-hangzhou.aliyuncs.com/...">
    </div>
    <div class="config-group">
      <label>API Key (可选)</label>
      <input type="password" id="apiKey" placeholder="Bearer token">
    </div>
    <div class="config-group">
      <label>超时时间 (秒)</label>
      <input type="number" id="timeout" value="300" min="30" max="600">
    </div>
    <button class="btn-primary" id="saveConfig">保存配置</button>
    <div style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-dim);margin-bottom:8px">
        <span><span class="status-dot offline" id="statusDot"></span>服务状态</span>
        <span id="statusText">未检测</span>
      </div>
      <button class="btn-secondary" id="checkHealth">检测服务状态</button>
    </div>
    <div style="margin-top:16px">
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px">记忆管理</div>
      <button class="btn-secondary" id="viewMemory">查看长期记忆</button>
    </div>
  </div>

  <!-- Logs Panel -->
  <div class="panel" id="panelLogs">
    <div id="logContent">[CA05] 客户端已启动<br>[CA05] 等待配置...</div>
  </div>
</div>

<script>
// ========== State ==========
const STATE = {
  endpoint: localStorage.getItem('ca05_endpoint') || '',
  apiKey: localStorage.getItem('ca05_apiKey') || '',
  timeout: parseInt(localStorage.getItem('ca05_timeout') || '300'),
  threadId: 'web-' + Date.now(),
  messages: [],
  sending: false
};

// ========== DOM refs ==========
const $ = id => document.getElementById(id);
const chatMessages = $('chatMessages');
const chatInput = $('chatInput');
const sendBtn = $('sendBtn');
const endpointUrl = $('endpointUrl');
const apiKey = $('apiKey');
const timeout = $('timeout');
const logContent = $('logContent');
const statusDot = $('statusDot');
const statusText = $('statusText');

// ========== Init ==========
endpointUrl.value = STATE.endpoint;
apiKey.value = STATE.apiKey;
timeout.value = STATE.timeout;

// ========== Tab switching ==========
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel' + tab.dataset.tab.charAt(0).toUpperCase() + tab.dataset.tab.slice(1)).classList.add('active');
  });
});

// ========== Logging ==========
function log(msg) {
  const t = new Date().toLocaleTimeString();
  logContent.innerHTML += `<br>[${t}] ${msg}`;
  logContent.scrollTop = logContent.scrollHeight;
}

// ========== Config ==========
$('saveConfig').addEventListener('click', () => {
  STATE.endpoint = endpointUrl.value.trim();
  STATE.apiKey = apiKey.value.trim();
  STATE.timeout = parseInt(timeout.value) || 300;
  localStorage.setItem('ca05_endpoint', STATE.endpoint);
  localStorage.setItem('ca05_apiKey', STATE.apiKey);
  localStorage.setItem('ca05_timeout', STATE.timeout);
  log('配置已保存');
  if (STATE.endpoint) checkHealthStatus();
});

$('checkHealth').addEventListener('click', checkHealthStatus);

async function checkHealthStatus() {
  if (!STATE.endpoint) {
    statusText.textContent = '请先配置端点';
    return;
  }
  const healthUrl = STATE.endpoint.replace(/\/invocations.*$/, '').replace(/\/chat.*$/, '').replace(/\/v1\/chat\/completions.*$/, '') + '/health';
  try {
    const resp = await fetch(healthUrl, { signal: AbortSignal.timeout(5000) });
    const data = await resp.json();
    if (data.status === 'ok') {
      statusDot.className = 'status-dot online';
      statusText.textContent = `在线 (${data.aliyun_cli ? 'CLI就绪' : 'CLI未安装'})`;
      log('服务健康检查通过');
    } else {
      throw new Error('状态异常');
    }
  } catch(e) {
    statusDot.className = 'status-dot offline';
    statusText.textContent = '离线';
    log(`健康检查失败: ${e.message}`);
  }
}

// ========== Memory ==========
$('viewMemory').addEventListener('click', async () => {
  if (!STATE.endpoint) { log('请先配置端点'); return; }
  const baseUrl = STATE.endpoint.replace(/\/invocations.*$/, '');
  try {
    const resp = await fetch(`${baseUrl}/memory`, { signal: AbortSignal.timeout(10000) });
    const data = await resp.json();
    addMessage('assistant', `**长期记忆内容:**\n\`\`\`json\n${JSON.stringify(data.memory, null, 2)}\n\`\`\``);
    document.querySelector('[data-tab="chat"]').click();
    log('已读取长期记忆');
  } catch(e) {
    log(`读取记忆失败: ${e.message}`);
  }
});

// ========== Send message ==========
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || STATE.sending) return;

  if (!STATE.endpoint) {
    addMessage('error', '请先在「配置」页设置 AgentRun 端点 URL');
    document.querySelector('[data-tab="config"]').click();
    return;
  }

  STATE.sending = true;
  sendBtn.disabled = true;
  chatInput.value = '';
  addMessage('user', text);

  // Show typing indicator
  const typingEl = document.createElement('div');
  typingEl.className = 'typing';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  typingEl.id = 'typingInd';
  chatMessages.appendChild(typingEl);
  chatMessages.scrollTop = chatMessages.scrollHeight;

  const timeoutMs = STATE.timeout * 1000;
  const startTime = Date.now();

  // Timer display
  const timerMsg = document.createElement('div');
  timerMsg.className = 'msg assistant';
  timerMsg.style.cssText = 'font-size:12px;color:var(--text-dim);align-self:center';
  timerMsg.id = 'timerMsg';

  try {
    // Try /chat endpoint first, fallback to /v1/chat/completions
    const baseUrl = STATE.endpoint.replace(/\/invocations.*$/, '');
    const payload = { message: text, thread_id: STATE.threadId };
    const headers = { 'Content-Type': 'application/json' };
    if (STATE.apiKey) headers['Authorization'] = `Bearer ${STATE.apiKey}`;

    // Show timer
    chatMessages.appendChild(timerMsg);
    const timerInterval = setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timerMsg.textContent = `处理中... ${elapsed}s`;
    }, 1000);

    const resp = await fetch(`${baseUrl}/chat`, {
      method: 'POST',
      headers,
      body: JSON.stringify(payload),
      signal: AbortSignal.timeout(timeoutMs)
    });

    clearInterval(timerInterval);
    timerMsg.remove();

    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    }

    const data = await resp.json();
    const messages = data.messages || [];
    const lastAssistant = messages.filter(m => m.role === 'assistant').pop();
    const reply = lastAssistant ? lastAssistant.content : '(无响应)';

    // Remove typing indicator
    const typing = document.getElementById('typingInd');
    if (typing) typing.remove();

    addMessage('assistant', reply);
    log(`消息已发送，响应 ${reply.length} 字符`);

  } catch (e) {
    const typing = document.getElementById('typingInd');
    if (typing) typing.remove();
    timerMsg.remove();

    let errorMsg = e.message;
    if (e.name === 'TimeoutError' || e.name === 'AbortError') {
      errorMsg = `请求超时（${STATE.timeout}秒）。请检查端点是否正确，或增加超时时间。`;
    }
    addMessage('error', `请求出错: ${errorMsg}`);
    log(`错误: ${errorMsg}`);
  }

  STATE.sending = false;
  sendBtn.disabled = false;
  chatInput.focus();
}

// ========== Add message ==========
function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  // Simple markdown rendering
  let html = content
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  div.innerHTML = html + '<div class="timestamp">' + new Date().toLocaleTimeString() + '</div>';
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  STATE.messages.push({ role, content });
}

// ========== Keyboard shortcut: Ctrl+Enter to send ==========
chatInput.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') sendMessage();
});

// Auto-check health on startup if endpoint exists
if (STATE.endpoint) {
  setTimeout(checkHealthStatus, 1000);
}

log('CA05 客户端已就绪');
</script>
</body>
</html>
