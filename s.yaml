edition: 3.0.0
name: ca05-web
access: "agentrun-deploy"

vars:
  region: cn-hangzhou

resources:
  dev-agent:
    component: agentrun@0.1.0
    props:
      region: ${vars.region}
      agent:
        name: ca05-web
        description: "CA05 – Cross-Cloud Operations Assistant"

        # 源代码部署（无需 Docker 镜像/ACR）
        customContainerConfig:/n          image: 'ghcr.io/leonhzm-coder/ca05:${IMAGE_TAG}'/n          command: ['python3', 'main.py']
